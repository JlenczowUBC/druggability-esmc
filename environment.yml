name: druggability-esmc
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - jupyter
  - notebook
  - ipykernel
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - tqdm
  - pytorch
  - pytorch-cuda=12.1
  - pip:
    - transformers>=4.46
    - peft>=0.13
    - accelerate
    - huggingface_hub
    - safetensors
    - "esm@git+https://github.com/Biohub/esm.git@c94ed8d"
